<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>第36天 旅程回放</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090c0f;
      --text: #f4f7f4;
      --muted: #b2c0ba;
      --panel: rgba(9, 12, 15, 0.72);
      --line: rgba(255, 255, 255, 0.14);
      --accent: #8bd6ad;
      --bottom-safe: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0;
      width: 100vw;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .immersive-replay {
      position: fixed;
      inset: 0;
      width: 100vw;
      max-width: 100vw;
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr auto;
      background: #050708;
    }
    .replay-stage {
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      min-height: 0;
    }
    .replay-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transform: scale(1.01);
      transition: opacity 560ms cubic-bezier(0.2, 0, 0, 1), transform 560ms cubic-bezier(0.2, 0, 0, 1);
    }
    .replay-layer.is-active {
      opacity: 1;
      transform: scale(1);
    }
    .replay-top {
      position: absolute;
      top: max(14px, env(safe-area-inset-top, 0px));
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      z-index: 2;
      pointer-events: none;
    }
    .pill {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      backdrop-filter: blur(14px);
    }
    .replay-sheet {
      position: relative;
      z-index: 3;
      display: grid;
      gap: 10px;
      width: 100%;
      max-width: 100vw;
      min-width: 0;
      padding: 14px 14px calc(14px + var(--bottom-safe));
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(9, 12, 15, 0.7), rgba(9, 12, 15, 0.94));
      backdrop-filter: blur(16px);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.18;
      letter-spacing: 0;
    }
    .trace-line {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
    .caption {
      color: var(--text);
      font-size: 15px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .excerpt, .route, .local-only {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .progress {
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
    }
    .bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
    }
    audio {
      width: 100%;
    }
    .debug-info {
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .p1b-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      min-width: 0;
      width: min(100%, 362px);
    }
    .p1b-tab {
      min-width: 0;
      padding: 7px 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font: inherit;
      font-size: 11px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .p1b-tab.is-active {
      border-color: rgba(139, 214, 173, 0.72);
      color: var(--text);
      background: rgba(139, 214, 173, 0.14);
    }
    .p1b-panel {
      display: none;
      max-height: min(34vh, 260px);
      overflow: auto;
      min-width: 0;
      width: min(100%, 362px);
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .p1b-panel.is-active {
      display: grid;
      gap: 8px;
    }
    .memory-card-list, .route-segment-list, .variant-list {
      display: grid;
      gap: 8px;
    }
    .memory-card, .route-segment, .variant-option {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      padding: 9px;
      font: inherit;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .memory-card strong, .route-segment strong, .variant-option strong {
      display: block;
      font-size: 13px;
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .meta-line, .variant-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .media-info-grid {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr);
      gap: 6px 10px;
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
    }
    .media-info-grid dt {
      color: var(--muted);
    }
    .media-info-grid dd {
      margin: 0;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    @media (min-width: 760px) {
      body { overflow: auto; }
      .immersive-replay {
        width: min(430px, 100vw);
        margin: 0 auto;
        box-shadow: 0 0 0 1px var(--line);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .replay-layer {
        transition: opacity 120ms linear;
        transform: none;
      }
      .replay-layer.is-active {
        transform: none;
      }
    }
  </style>
</head>

    const query = new URLSearchParams(window.location.search);
    const showDebugInfo = query.get('debug_info') === 'true';
    const debugInfo = document.getElementById('debug-info');
    const audio = document.getElementById('replay-audio');
    const layers = [document.getElementById('replay-a'), document.getElementById('replay-b')];
    const caption = document.getElementById('replay-caption');
    const excerpt = document.getElementById('replay-excerpt');
    const bar = document.getElementById('replay-bar');
    const memoryCardList = document.getElementById('memory-card-list');
    const routeSegmentList = document.getElementById('route-segment-list');
    const activeMediaMetadata = document.getElementById('active-media-metadata');
    const activePacingMetadata = document.getElementById('active-pacing-metadata');
    const variantList = document.getElementById('variant-list');
    const variantText = document.getElementById('variant-text');
    const cache = new Map();
    const mediaByPath = new Map(mediaMetadata.map((item) => [item.relative_path, item]));
    const mediaByStem = new Map(mediaMetadata.map((item) => [stemOf(item.relative_path), item]));
    let activeIndex = -1;
    let activeLayer = 0;
    let transitionToken = 0;

    if (debugInfo) {
      debugInfo.hidden = !showDebugInfo;
      debugInfo.dataset.debugInfo = showDebugInfo ? 'true' : 'false';
    }

    function stemOf(path) {
      const file = String(path || '').split('/').pop() || '';
      return file.replace(/\.[^.]+$/, '');
    }

    function friendlyText(text) {
      return String(text ?? '').replace(/\bD(\d+)\b/g, '\u7b2c$1\u5929');
    }

    function clearNode(node) {
      if (!node) return;
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function textBlock(text, className) {
      const node = document.createElement('div');
      node.className = className || 'meta-line';
      node.textContent = text || '';
      return node;
    }

    function detailRow(parent, label, value) {
      const dt = document.createElement('dt');
      const dd = document.createElement('dd');
      dt.textContent = label;
      dd.textContent = Array.isArray(value) ? value.join(', ') : String(value ?? '');
      parent.append(dt, dd);
    }

    function setPanel(panelId) {
      document.querySelectorAll('.p1b-tab').forEach((tab) => {
        tab.classList.toggle('is-active', tab.dataset.panel === panelId);
      });
      document.querySelectorAll('.p1b-panel').forEach((panel) => {
        panel.classList.toggle('is-active', panel.id === panelId);
      });
    }

    function seekToCueIndex(nextIndex) {
      if (!cues.length || !Number.isInteger(nextIndex)) return;
      const normalized = Math.max(0, Math.min(nextIndex, cues.length - 1));
      renderCue(normalized);
      if (audio) {
        audio.currentTime = cues[normalized].start_sec || 0;
      }
    }

    function renderMemoryCards() {
      clearNode(memoryCardList);
      memoryCards.forEach((card) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'memory-card';
        const title = document.createElement('strong');
        title.textContent = friendlyText(card.title || card.card_id);
        button.append(title);
        button.append(textBlock((card.type || 'card') + ' · ' + (card.location_label || 'route memory')));
        button.append(textBlock(card.narration_hook || card.description || ''));
        button.addEventListener('click', () => seekToCueIndex(card.source_cue_index));
        memoryCardList.append(button);
      });
    }

    function renderRouteSegments() {
      clearNode(routeSegmentList);
      routeSegments.forEach((segment) => {
        const node = document.createElement('article');
        node.className = 'route-segment';
        const title = document.createElement('strong');
        title.textContent = (segment.from_label || '') + ' -> ' + (segment.to_label || '');
        node.append(title);
        node.append(textBlock((segment.country_sequence || []).join(' / ') + ' · ' + (segment.emotional_tone || '')));
        node.append(textBlock(segment.route_context || ''));
        node.append(textBlock('Media: ' + (segment.related_media_ids || []).join(', ')));
        node.append(textBlock('Cards: ' + (segment.related_card_ids || []).join(', ')));
        routeSegmentList.append(node);
      });
    }

    function mediaForCue(cue) {
      if (!cue) return null;
      return mediaByPath.get(cue.image_path) || mediaByStem.get(stemOf(cue.image_path)) || null;
    }

    function updateActiveMediaMetadata(cue) {
      clearNode(activeMediaMetadata);
      clearNode(activePacingMetadata);
      const media = mediaForCue(cue);
      if (media) {
        detailRow(activeMediaMetadata, 'location', media.location_label);
        detailRow(activeMediaMetadata, 'scene', media.scene_type);
        detailRow(activeMediaMetadata, 'mood', media.mood);
        detailRow(activeMediaMetadata, 'privacy', media.privacy_level);
        detailRow(activeMediaMetadata, 'cover', media.cover_candidate);
        detailRow(activeMediaMetadata, 'transition', media.transition_candidate);
        detailRow(activeMediaMetadata, 'tags', media.tags || []);
      } else {
        detailRow(activeMediaMetadata, 'media', 'metadata unavailable');
      }
      const pacing = cue && cue.playback_pacing ? cue.playback_pacing : {};
      detailRow(activePacingMetadata, 'duration', pacing.suggested_duration_seconds || cue.segment_duration_sec || '');
      detailRow(activePacingMetadata, 'transition_type', pacing.transition_type || 'soft_crossfade');
      detailRow(activePacingMetadata, 'visual_priority', pacing.visual_priority || '');
      detailRow(activePacingMetadata, 'narration_priority', pacing.narration_priority || '');
      detailRow(activePacingMetadata, 'map_focus', pacing.map_focus || '');
    }

    function renderNarrationVariants() {
      clearNode(variantList);
      narrationVariants.forEach((variant, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'variant-option';
        const title = document.createElement('strong');
        title.textContent = variant.variant_id + ' · ' + variant.target_duration_seconds + 's';
        button.append(title);
        button.append(textBlock(variant.intended_surface || 'text variant'));
        button.addEventListener('click', () => {
          variantText.textContent = variant.text || '';
        });
        variantList.append(button);
        if (index === 0) variantText.textContent = variant.text || '';
      });
    }

    function cueIndexAt(time) {
      if (!cues.length) return -1;
      const matched = cues.findIndex((cue) => time >= cue.start_sec && time < cue.end_sec);
      if (matched !== -1) return matched;
      return time >= cues[cues.length - 1].end_sec ? cues.length - 1 : 0;
    }

    function preloadImage(src) {
      if (!src) return Promise.reject(new Error('missing image'));
      if (cache.has(src)) return cache.get(src);
      const promise = new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(src);
        img.onerror = reject;
        img.src = src;
      });
      cache.set(src, promise);
      return promise;
    }

    function updateText(cue) {
      caption.textContent = friendlyText(cue.caption);
      excerpt.textContent = friendlyText(cue.narration_excerpt || '');
      const progressBase = audio && Number.isFinite(audio.duration) ? audio.duration : cues[cues.length - 1].end_sec;
      const progressTime = audio ? audio.currentTime : cue.end_sec;
      bar.style.width = `${Math.min(100, (progressTime / progressBase) * 100)}%`;
      updateActiveMediaMetadata(cue);
    }

    async function renderCue(nextIndex) {
      if (!cues.length) return;
      const normalized = Math.max(0, Math.min(nextIndex, cues.length - 1));
      const cue = cues[normalized];
      const token = ++transitionToken;
      if (normalized === activeIndex) {
        updateText(cue);
        return;
      }
      activeIndex = normalized;
      updateText(cue);
      try {
        await preloadImage(cue.src);
      } catch (error) {
        return;
      }
      if (token !== transitionToken) return;
      const incoming = layers[1 - activeLayer];
      const outgoing = layers[activeLayer];
      incoming.src = cue.src;
      incoming.alt = friendlyText(cue.caption);
      requestAnimationFrame(() => {
        if (token !== transitionToken) return;
        incoming.classList.add('is-active');
        outgoing.classList.remove('is-active');
        activeLayer = 1 - activeLayer;
        preloadImage(cues[(activeIndex + 1) % cues.length].src).catch(() => undefined);
      });
    }

    function renderInitialCue(nextIndex) {
      if (!cues.length) return;
      const normalized = Math.max(0, Math.min(nextIndex, cues.length - 1));
      activeIndex = normalized;
      const cue = cues[activeIndex];
      layers[activeLayer].src = cue.src;
      layers[activeLayer].alt = friendlyText(cue.caption);
      updateText(cue);
      preloadImage(cue.src).catch(() => undefined);
      preloadImage(cues[(activeIndex + 1) % cues.length].src).catch(() => undefined);
    }

    function syncFromAudio() {
      if (!audio || !cues.length) return;
      renderCue(cueIndexAt(audio.currentTime));
    }

    if (audio) {
      audio.addEventListener('timeupdate', syncFromAudio);
      audio.addEventListener('seeked', syncFromAudio);
      audio.addEventListener('loadedmetadata', syncFromAudio);
    }
    document.querySelectorAll('.p1b-tab').forEach((tab) => {
      tab.addEventListener('click', () => setPanel(tab.dataset.panel));
    });
    if (showDebugInfo) {
      renderMemoryCards();
      renderRouteSegments();
      renderNarrationVariants();
    }
    renderInitialCue(0);
