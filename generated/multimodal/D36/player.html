<html lang="zh-CN">
<head>

  <title>D36 TravelJournal Player</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #101418;
      --panel: #171d23;
      --text: #eef4f8;
      --muted: #9db0bc;
      --line: #2c3740;
      --accent: #77c7a1;

      --visual-aspect: 941 / 1672;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 32px;
    }
    header {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .route, .meta, .caption, .excerpt {
      color: var(--muted);
    }
    .stage {
      display: grid;
      gap: 16px;
      grid-template-columns: minmax(280px, 520px) minmax(280px, 1fr);
      align-items: start;
      justify-content: center;
    }
    .viewer, .side {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .viewer {
      overflow: hidden;
    }
    .image-frame {
      position: relative;
      width: min(100%, 520px);
      max-height: min(78vh, 820px);
      margin: 0 auto;
      aspect-ratio: var(--visual-aspect);
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background: #0a0d10;
    }
    .visual-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      opacity: 0;
      transform: scale(1.012);
      transition: opacity 560ms cubic-bezier(0.2, 0, 0, 1), transform 560ms cubic-bezier(0.2, 0, 0, 1);
      will-change: opacity, transform;
    }
    .visual-layer.is-active {
      opacity: 1;
      transform: scale(1);
    }
    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      pointer-events: none;
    }
    .empty.is-hidden {
      display: none;
    }
    .image-load-error {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(16, 20, 24, 0.78);
      color: var(--accent-2);
      font-size: 13px;
      line-height: 1.4;
      opacity: 0;
      pointer-events: none;
    }
    .image-load-error:not(:empty) {
      opacity: 1;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    button {
      min-width: 40px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #202932;
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { border-color: var(--accent); }
    .progress {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #2a333b;
      overflow: hidden;
    }
    .bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .details {
      display: grid;
      gap: 6px;
      padding: 12px;
      min-height: 116px;
      line-height: 1.5;
    }
    .excerpt {
      font-size: 14px;
    }
    .cue-note {
      font-size: 13px;
      color: var(--accent-2);
    }
    .side {
      padding: 16px;
      display: grid;
      gap: 16px;
    }
    audio { width: 100%; }
    .audio-missing {
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 6px;
      color: var(--muted);
      line-height: 1.5;
    }
    a { color: var(--accent); }
    @media (max-width: 820px) {
      .stage { grid-template-columns: 1fr; }
      main { width: min(100vw - 20px, 1120px); padding-top: 18px; }
      .image-frame { width: 100%; max-height: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .visual-layer {
        transition: opacity 120ms linear;
        transform: none;
      }
      .visual-layer.is-active {
        transform: none;
      }
    }
  </style>

      visualLayers[activeLayer].alt = cue.caption;
      empty.classList.add('is-hidden');
      updateCueText(cue);
      updateProgress(cue);
      preloadImage(cue.src).catch(() => {
        imageLoadError.textContent = '图片加载失败，请检查本地图片路径。';
      });
      preloadNextCue(activeIndex);
    }

    function syncFromAudio() {
      if (!audio || !cues.length) return;
      renderCue(cueIndexAt(audio.currentTime));
    }

    function seekToCue(nextIndex) {
      if (!cues.length) return;
      const normalized = (nextIndex + cues.length) % cues.length;
      renderCue(normalized);
      if (audio) {
        audio.currentTime = cues[normalized].start_sec;
      }
    }

    document.getElementById('prev').addEventListener('click', () => seekToCue(activeIndex - 1));
    document.getElementById('next').addEventListener('click', () => seekToCue(activeIndex + 1));
    if (audio) {
      audio.addEventListener('timeupdate', syncFromAudio);
      audio.addEventListener('seeked', syncFromAudio);
      audio.addEventListener('loadedmetadata', syncFromAudio);
      audio.addEventListener('play', syncFromAudio);
      audio.addEventListener('pause', syncFromAudio);
    }

    renderInitialCue(0);
  </script>
</body>
</html>
