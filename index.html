  <title>TravelJournal Public</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090c0f;
      --text: #f4f7f4;
      --muted: #b2c0ba;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #8bd6ad;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, 100%);
      display: grid;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.12;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .actions {
      display: grid;
      gap: 10px;
    }
    a {
      display: block;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.06);
    }
    a.primary {
      border-color: rgba(139, 214, 173, 0.74);
      background: rgba(139, 214, 173, 0.13);
    }
    small {
      color: var(--muted);
      line-height: 1.5;
    }

</head>
