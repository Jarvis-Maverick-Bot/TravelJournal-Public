<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>TravelJournal First Cohort</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090c0f;
      --text: #f4f7f4;
      --muted: #b2c0ba;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #8bd6ad;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, 100%);
      display: grid;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.12;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .status {
      width: fit-content;
      padding: 7px 10px;
      border: 1px solid rgba(139, 214, 173, 0.72);
      border-radius: 999px;
      color: var(--accent);
      font-size: 12px;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <main>
    <div class="status">waiting manual confirmation</div>
    <h1>TravelJournal First Cohort</h1>
    <p>首批用户静态预览页已预留。当前内容还没有经过 Alex 手工确认，因此正式 D36 回放尚未公开发布。</p>
    <p>确认后，这里会替换为包含图片、音频、文字和反馈入口的 first cohort preview。</p>
  </main>
</body>
</html>
